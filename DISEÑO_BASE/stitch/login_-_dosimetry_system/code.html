<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Dosimetry System</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
    </style>
</head>
<body class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-50 overflow-x-hidden antialiased">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 lg:px-10">
<div class="flex items-center gap-3">
<div class="flex h-8 w-8 items-center justify-center rounded bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl">radiology</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight">Dosimetry System</h2>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-200 text-sm font-semibold leading-normal transition-colors duration-200">
<span class="truncate">Contact Support</span>
</button>
</header>
<!-- Main Layout -->
<main class="flex flex-1 flex-col items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
<!-- Login Card -->
<div class="w-full max-w-[480px] flex flex-col rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 p-8 sm:p-10">
<!-- Headline & Body -->
<div class="mb-8 text-center">
<div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">lock</span>
</div>
<h2 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight mb-2">Portal Login</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">
                    Please enter your credentials to access the dosimetry monitoring dashboard.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<!-- Email Field -->
<label class="flex flex-col gap-1.5">
<span class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal">Email or Username</span>
<div class="relative">
<input class="form-input flex w-full resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-colors" placeholder="user@hospital.com" type="text"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none flex">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</label>
<!-- Password Field -->
<label class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<span class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal">Password</span>
<a class="text-primary hover:text-blue-600 text-sm font-medium transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex w-full items-center">
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 pl-4 pr-12 text-base placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-colors" placeholder="Enter password" type="password"/>
<button class="absolute right-0 top-0 bottom-0 px-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 flex items-center justify-center transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</label>
<!-- Actions -->
<div class="pt-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-blue-600 text-white text-base font-bold leading-normal tracking-[0.015em] shadow-sm transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">
<span class="truncate">Sign In</span>
</button>
</div>
</form>
<!-- SSO / Divider -->
<div class="mt-8 flex flex-col gap-4">
<div class="relative flex items-center py-2">
<div class="grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="mx-3 flex-shrink text-xs font-medium text-slate-500 uppercase">Or continue with</span>
<div class="grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<button class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 px-4 text-slate-700 dark:text-slate-200 text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">domain</span>
<span>Hospital SSO</span>
</button>
</div>
<!-- Footer Help -->
<div class="mt-8 text-center">
<p class="text-xs text-slate-500 dark:text-slate-400">
                    Having trouble logging in? <a class="text-primary hover:underline" href="#">Contact System Admin</a>
</p>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-8 flex items-center gap-2 text-xs text-slate-400 dark:text-slate-500">
<div class="h-2 w-2 rounded-full bg-emerald-500"></div>
<span>System Status: Operational</span>
</div>
</main>
</body></html>

name: Supabase Keep-Alive Robot

on:
  schedule:
    # Se ejecuta cada 4 días a las 00:00 UTC (seguro dentro del margen de 7 días)
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions de GitHub

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Llamada a la API de Supabase
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/supabase_heartbeat" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json"
